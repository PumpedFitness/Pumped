name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_backend:
        description: Force backend deployment (ignore change detection)
        type: boolean
        default: false
      force_frontend:
        description: Force frontend build (ignore change detection)
        type: boolean
        default: false
      force_infra:
        description: Force infrastructure update (ignore change detection)
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # ─── Change Detection ─────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      infra: ${{ steps.detect.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes since last deploy
        id: detect
        run: |
          BACKEND=false
          FRONTEND=false
          INFRA=false

          # Apply force flags from manual dispatch
          if [ "${{ inputs.force_backend }}" = "true" ]; then BACKEND=true; fi
          if [ "${{ inputs.force_frontend }}" = "true" ]; then FRONTEND=true; fi
          if [ "${{ inputs.force_infra }}" = "true" ]; then INFRA=true; fi

          # Auto-detect from git diff
          LAST_TAG=$(git tag -l 'deploy-*' --sort=-version:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BASE=$LAST_TAG
          else
            BASE=HEAD~1
          fi
          echo "Comparing against: $BASE"

          CHANGED=$(git diff --name-only "$BASE" HEAD)

          if [ "$BACKEND" = "false" ] && echo "$CHANGED" | grep -q '^apps/backend/'; then
            BACKEND=true
          fi
          if [ "$FRONTEND" = "false" ] && echo "$CHANGED" | grep -q '^apps/frontend/'; then
            FRONTEND=true
          fi
          if [ "$INFRA" = "false" ] && echo "$CHANGED" | grep -q '^infra/'; then
            INFRA=true
          fi

          echo "backend=$BACKEND" >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "infra=$INFRA" >> $GITHUB_OUTPUT
          echo "Backend: $BACKEND, Frontend: $FRONTEND, Infra: $INFRA"

  # ─── Lint & Format ────────────────────────────────────────────────────────────
  lint-backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Build & Test
        run: ./apps/backend/gradlew -p apps/backend build --no-daemon --console=plain

  lint-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Lint
        run: bun run --cwd apps/frontend lint

      - name: Check formatting
        run: bun run --cwd apps/frontend format:check

  # ─── Update Infrastructure ───────────────────────────────────────────────────
  update-infra:
    needs: [changes]
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write infra .env
        shell: bash
        env:
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          printenv | grep -E '^(ACME_EMAIL|DB_ROOT_PASSWORD|DB_USER|DB_PASSWORD|REDIS_PASSWORD)=' > /tmp/infra.env
          echo "DB_NAME=dumbbell" >> /tmp/infra.env

          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ~/dumbbell && docker network create dumbbell-net 2>/dev/null || true"

          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            infra/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/dumbbell/docker-compose.yml

          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            /tmp/infra.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/dumbbell/infra.env

      - name: Start infrastructure
        shell: bash
        run: |
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/dumbbell && touch acme.json && chmod 600 acme.json && docker compose --env-file infra.env up -d --wait"

      - name: Create staging database
        shell: bash
        run: |
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/dumbbell && docker exec -i mariadb-dumbbell mariadb -u root --password=\$(grep DB_ROOT_PASSWORD infra.env | cut -d= -f2-) -e \"CREATE DATABASE IF NOT EXISTS dumbbell_staging; GRANT ALL PRIVILEGES ON dumbbell_staging.* TO '\$(grep DB_USER infra.env | cut -d= -f2-)'@'%'; FLUSH PRIVILEGES;\"" || true

          rm -f /tmp/ssh_key /tmp/infra.env

  # ─── Publish Backend Image ────────────────────────────────────────────────────
  publish:
    needs: [changes, lint-backend]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.lint-backend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Backend
        uses: ./.github/actions/setup-backend

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dumbbell-backend" >> $GITHUB_OUTPUT

      - name: Publish image to GHCR
        uses: ./.github/actions/publish-backend
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ steps.image.outputs.name }}

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    needs: [changes, publish, update-infra]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.publish.result == 'success' &&
      (needs.update-infra.result == 'success' || needs.update-infra.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        uses: ./.github/actions/deploy-staging
        with:
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          image-name: ${{ needs.publish.outputs.image-name }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          db-user: ${{ secrets.DB_USER }}
          db-password: ${{ secrets.DB_PASSWORD }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}
          staging-domain: ${{ secrets.DOMAIN }}

  # ─── Build Frontend (against staging API) ─────────────────────────────────────
  build-frontend:
    needs: [changes, deploy-staging, lint-frontend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend against staging
        uses: ./.github/actions/build-frontend
        with:
          staging-url: https://${{ secrets.STAGING_DOMAIN }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}

  # ─── Deploy Production ────────────────────────────────────────────────────────
  deploy-production:
    needs: [changes, publish, build-frontend, deploy-staging, update-infra]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.publish.result == 'success' &&
      needs.deploy-staging.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.update-infra.result == 'success' || needs.update-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend to production
        uses: ./.github/actions/deploy-backend
        with:
          ssh-host: ${{ secrets.SSH_HOST }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          image-name: ${{ needs.publish.outputs.image-name }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          domain: ${{ secrets.DOMAIN }}
          db-user: ${{ secrets.DB_USER }}
          db-password: ${{ secrets.DB_PASSWORD }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          swagger-username: ${{ secrets.SWAGGER_USERNAME }}
          swagger-password: ${{ secrets.SWAGGER_PASSWORD }}

      - name: Tag deployment
        run: |
          git tag "deploy-$(date +%Y%m%d-%H%M%S)"
          git push origin --tags


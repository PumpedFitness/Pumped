name: Deploy Staging
description: Deploys the backend to the staging environment with health check. Traefik auto-routes.

inputs:
  ssh-host:
    description: Server hostname or IP
    required: true
  ssh-user:
    description: SSH user
    required: true
  ssh-private-key:
    description: SSH private key
    required: true
  image-name:
    description: Full image name including registry
    required: true
  image-tag:
    description: Image tag to deploy
    required: false
    default: latest
  registry-username:
    description: GHCR username
    required: true
  registry-password:
    description: GHCR password
    required: true
  db-root-password:
    description: MariaDB root password (for creating staging DB)
    required: true
  db-user:
    description: MariaDB application user
    required: true
  db-password:
    description: MariaDB application user password
    required: true
  redis-password:
    description: Redis password
    required: true
  jwt-secret:
    description: JWT signing secret
    required: true
  swagger-username:
    description: Swagger UI username
    required: true
  swagger-password:
    description: Swagger UI password
    required: true
  staging-domain:
    description: Staging domain (e.g. staging.pumpedfitness.de)
    required: true

runs:
  using: composite
  steps:
    - name: Copy compose file to server
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/ssh_key
        chmod 600 /tmp/ssh_key

        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          "mkdir -p ~/dumbbell"

        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          infra/docker-compose.staging.yml \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/docker-compose.staging.yml

    - name: Deploy staging
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        DB_ROOT_PASSWORD: ${{ inputs.db-root-password }}
        DB_USER: ${{ inputs.db-user }}
        DB_PASSWORD: ${{ inputs.db-password }}
        REDIS_PASSWORD: ${{ inputs.redis-password }}
        JWT_SECRET: ${{ inputs.jwt-secret }}
        SWAGGER_USERNAME: ${{ inputs.swagger-username }}
        SWAGGER_PASSWORD: ${{ inputs.swagger-password }}
        STAGING_DOMAIN: ${{ inputs.staging-domain }}
      run: |
        printenv | grep -E '^(IMAGE_NAME|IMAGE_TAG|REGISTRY_USERNAME|REGISTRY_PASSWORD|DB_ROOT_PASSWORD|DB_USER|DB_PASSWORD|REDIS_PASSWORD|JWT_SECRET|SWAGGER_USERNAME|SWAGGER_PASSWORD|STAGING_DOMAIN)=' > /tmp/staging.env

        scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          /tmp/staging.env \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:~/dumbbell/staging.env

        ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} << 'DEPLOY'
          set -euo pipefail
          cd ~/dumbbell
          set -a && source staging.env && set +a

          echo "${REGISTRY_PASSWORD}" | docker login ghcr.io -u "${REGISTRY_USERNAME}" --password-stdin
          docker compose -f docker-compose.staging.yml pull backend-staging

          # Create staging DB if needed
          docker exec mariadb-dumbbell mariadb -u root -p"${DB_ROOT_PASSWORD}" \
            -e "CREATE DATABASE IF NOT EXISTS dumbbell_staging;" \
            -e "GRANT ALL ON dumbbell_staging.* TO '${DB_USER}'@'%';" 2>/dev/null || true

          docker compose -f docker-compose.staging.yml up -d --force-recreate backend-staging

          # Health check
          echo "Waiting for staging to be healthy..."
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' dumbbell-backend-staging 2>/dev/null || echo "starting")
            echo "  attempt $i/18: $STATUS"
            if [ "$STATUS" = "healthy" ]; then echo "Staging deploy complete"; rm -f staging.env; exit 0; fi
            if [ "$STATUS" = "unhealthy" ]; then echo "FAILED"; rm -f staging.env; exit 1; fi
            sleep 5
          done
          echo "Timed out"; rm -f staging.env; exit 1
        DEPLOY

        rm -f /tmp/ssh_key /tmp/staging.env

name: E2E Android (Maestro)
description: >-
  Download the APK built by build-android, boot an Android emulator, install it,
  and run the Maestro flows against it.

inputs:
  artifact-name:
    description: Name of the APK artifact to download
    required: false
    default: android-apk
  app-id:
    description: Android package name to launch
    required: false
    default: com.pumpedapp
  api-level:
    description: Android emulator API level
    required: false
    default: "34"

runs:
  using: composite
  steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/android-apk

    - name: Enable KVM (hardware accel for the emulator)
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Maestro on emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level }}
        arch: x86_64
        profile: pixel_6
        ram-size: 4096M
        disable-animations: true
        # Everything that needs the emulator must run inside this script — the
        # emulator only lives for its duration.
        script: |
          set -e
          APK="$(ls "${{ github.workspace }}"/android-apk/*.apk | head -1)"
          echo "Installing $APK"
          adb install -r "$APK"
          curl -fsSL https://open.devicelab.dev/install/maestro-runner | bash
          export PATH="$HOME/.maestro-runner/bin:$PATH"
          maestro-runner --platform android test \
            -e APP_ID="${{ inputs.app-id }}" \
            --output e2e-report-android --flatten \
            apps/frontend/.maestro

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-report-android
        path: e2e-report-android
        if-no-files-found: ignore

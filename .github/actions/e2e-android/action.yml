name: E2E Android (Maestro)
description: >-
  Download the APK built by build-android, boot an Android emulator, install it,
  and run the Maestro flows against it.

inputs:
  artifact-name:
    description: Name of the APK artifact to download
    required: false
    default: android-apk
  app-id:
    description: Android package name to launch
    required: false
    default: com.pumpedapp
  api-level:
    description: Android emulator API level
    required: false
    default: "34"
  maestro-version:
    description: maestro-runner version to install, or "latest"
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ github.workspace }}/android-apk

    # Restore the maestro-runner binary so the emulator script below skips the
    # download. Saved at post-job; the install inside the emulator step is the
    # cache-miss fallback.
    - name: Cache maestro-runner
      uses: actions/cache@v4
      with:
        path: ~/.maestro-runner
        key: maestro-runner-${{ runner.os }}-${{ runner.arch }}-${{ inputs.maestro-version }}

    - name: Enable KVM (hardware accel for the emulator)
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Maestro on emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level }}
        arch: x86_64
        profile: pixel_6
        ram-size: 4096M
        disable-animations: true
        # Everything that needs the emulator must run inside this script — the
        # emulator only lives for its duration. The runner executes the script
        # line-by-line in separate shells (vars/`set -e` don't persist), so keep
        # this to ONE line that runs a committed script in a single shell.
        script: bash apps/frontend/scripts/e2e-android.sh "${{ inputs.app-id }}" "${{ inputs.maestro-version }}"

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-report-android
        path: e2e-report-android
        if-no-files-found: ignore
        retention-days: 7

name: Setup app
description: Install Bun and an app's dependencies with a frozen lockfile.

inputs:
  working-directory:
    description: App directory containing package.json + bun.lock
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ inputs.working-directory }}

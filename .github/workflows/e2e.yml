name: E2E (Maestro)

# Mobile end-to-end tests — runs the .maestro flows with maestro-runner.
# Manual by default (native builds are slow + iOS uses paid macOS minutes).
# To run on frontend PRs, uncomment the pull_request trigger below.
on:
  workflow_dispatch:
  # pull_request:
  #   paths: ['apps/frontend/**']

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Android: build a JS-bundled debug APK, run on an emulator ─────────────────
  android:
    name: Android E2E (emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/frontend

      - name: Install maestro-runner
        run: |
          curl -fsSL https://open.devicelab.dev/install/maestro-runner | bash
          echo "$HOME/.maestro-runner/bin" >> "$GITHUB_PATH"

      # ⚠️ Project-specific / most likely to need tweaking on first run:
      # pre-bundle the JS into a debug APK so the app runs without Metro.
      # If `expo export:embed` flags differ on this RN/Expo version, the
      # fallback is to start Metro in the background + `adb reverse 8081`.
      - name: Build debug APK (JS bundled)
        working-directory: apps/frontend
        run: |
          mkdir -p android/app/src/main/assets
          bunx expo export:embed \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          cd android && ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r apps/frontend/android/app/build/outputs/apk/debug/app-debug.apk
            maestro-runner --platform android test \
              -e APP_ID=com.pumpedapp \
              --output "$GITHUB_WORKSPACE/e2e-report" --flatten \
              apps/frontend/.maestro

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-android-report
          path: e2e-report
          if-no-files-found: ignore

  # ─── iOS: build for the simulator (Release bundles JS), run on a sim ───────────
  ios:
    name: iOS E2E (simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/frontend

      - name: Install maestro-runner
        run: |
          curl -fsSL https://open.devicelab.dev/install/maestro-runner | bash
          echo "$HOME/.maestro-runner/bin" >> "$GITHUB_PATH"

      - name: Install CocoaPods
        working-directory: apps/frontend/ios
        run: pod install

      # ⚠️ Project-specific: verify the scheme/workspace names match the project.
      # Release config runs the React Native bundling phase, so the .app is
      # self-contained (no Metro). Simulator builds skip code signing.
      - name: Build app for simulator
        working-directory: apps/frontend
        run: |
          xcodebuild \
            -workspace ios/PumpedApp.xcworkspace \
            -scheme PumpedApp \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Boot simulator, install app, run flows
        working-directory: apps/frontend
        run: |
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl install booted \
            "ios/build/Build/Products/Release-iphonesimulator/PumpedApp.app"
          maestro-runner --platform ios test \
            -e APP_ID=org.reactjs.native.example.PumpedApp \
            --output "$GITHUB_WORKSPACE/e2e-report" --flatten \
            .maestro

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-report
          path: e2e-report
          if-no-files-found: ignore

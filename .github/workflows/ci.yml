name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Heavy native build + e2e stages only run on `main` and manual dispatch; PRs
# stop after verify + unit tests. GitHub has no cross-job condition reuse, so
# that gate is repeated inline on both build jobs below.

jobs:
  # ─── 1. Change detection ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      handover: ${{ steps.filter.outputs.handover }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            handover:
              - 'apps/handover/**'

  # ─── 2. Frontend verify + unit tests (PRs stop here) ──────────────────────
  frontend_verify:
    name: Frontend · verify (lint · tsc)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-verify

  frontend_test:
    name: Frontend · unit tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-unit-tests

  # ─── 3. Build sideloadable apps in parallel (main + manual only) ──────────
  frontend_build_ios:
    name: Frontend · build iOS (simulator)
    needs: [changes, frontend_verify, frontend_test]
    if: >-
      needs.changes.outputs.frontend == 'true' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-ios

  frontend_build_android:
    name: Frontend · build Android (APK)
    needs: [changes, frontend_verify, frontend_test]
    if: >-
      needs.changes.outputs.frontend == 'true' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-android

  # ─── 4. E2E the built apps in parallel (Maestro) ──────────────────────────
  frontend_e2e_ios:
    name: Frontend · e2e iOS
    needs: frontend_build_ios
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-ios

  frontend_e2e_android:
    name: Frontend · e2e Android
    needs: frontend_build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-android

  # ─── 5. Handover worker (test always; deploy on main when e2e is green) ───
  test_handover:
    name: Handover · typecheck
    needs: changes
    if: needs.changes.outputs.handover == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-app
        with:
          working-directory: apps/handover
      - run: bun run typecheck
        working-directory: apps/handover

  deploy_handover:
    name: Handover · deploy
    needs: [changes, test_handover, frontend_e2e_ios, frontend_e2e_android]
    # Deploy on main when the worker changed and its tests passed, provided the
    # frontend e2e suites passed or didn't need to run (frontend unchanged).
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.handover == 'true' &&
      needs.test_handover.result == 'success' &&
      (needs.frontend_e2e_ios.result == 'success' || needs.frontend_e2e_ios.result == 'skipped') &&
      (needs.frontend_e2e_android.result == 'success' || needs.frontend_e2e_android.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-handover
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

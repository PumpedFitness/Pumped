<!-- @dsCard group="Colors" viewport="700x190" name="Ink & accents" subtitle="Text ramp + the four curated accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
  .grid { display: flex; gap: 30px; flex-wrap: wrap; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--clay-muted); margin-bottom: 10px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { width: 88px; height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .nm { font-size: 12.5px; font-weight: 600; color: var(--clay-ink); }
  .vl { font-size: 11px; color: var(--clay-muted); }
</style></head>
<body>
  <div class="grid">
    <div>
      <div class="lbl">Ink / text</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--clay-ink)"></div><span class="nm">ink</span><span class="vl">primary</span></div>
        <div class="sw"><div class="chip" style="background:var(--clay-ink-2)"></div><span class="nm">ink-2</span><span class="vl">secondary</span></div>
        <div class="sw"><div class="chip" style="background:var(--clay-muted)"></div><span class="nm">muted</span><span class="vl">caption</span></div>
        <div class="sw"><div class="chip" style="background:var(--clay-sage)"></div><span class="nm">sage</span><span class="vl">success</span></div>
      </div>
    </div>
    <div>
      <div class="lbl">Accents</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--accent-terracotta)"></div><span class="nm">terracotta</span><span class="vl">default</span></div>
        <div class="sw"><div class="chip" style="background:var(--accent-honey)"></div><span class="nm">honey</span></div>
        <div class="sw"><div class="chip" style="background:var(--accent-rose)"></div><span class="nm">rose</span></div>
        <div class="sw"><div class="chip" style="background:var(--accent-sage)"></div><span class="nm">sage</span></div>
      </div>
    </div>
  </div>
</body></html>

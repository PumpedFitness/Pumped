<!-- @dsCard group="Colors" viewport="700x190" name="Ground & surfaces" subtitle="Oatmeal ground, cream cards, moss anchor" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { width: 96px; height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .nm { font-size: 12.5px; font-weight: 600; color: var(--clay-ink); }
  .vl { font-size: 11px; color: var(--clay-muted); font-variant-numeric: tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clay-bg)"></div><span class="nm">bg</span><span class="vl">#EAE3D5</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-bg-warm)"></div><span class="nm">bg-warm</span><span class="vl">#E4DCCB</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-card)"></div><span class="nm">card</span><span class="vl">#F7F2E8</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-card-sunk)"></div><span class="nm">card-sunk</span><span class="vl">#EFE8DA</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-moss)"></div><span class="nm">moss</span><span class="vl">#46583C</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-moss-deep)"></div><span class="nm">moss-deep</span><span class="vl">#3A4A32</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-cream)"></div><span class="nm">cream</span><span class="vl">#F3EEE2</span></div>
  </div>
</body></html>

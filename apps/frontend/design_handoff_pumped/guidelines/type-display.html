<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Greetings, titles, big metric numbers" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--clay-bg); }
  .spec { color: var(--clay-ink); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--clay-muted); margin-top: 2px; }
  .stack > div { margin-bottom: 16px; }
</style></head>
<body>
  <div class="stack spec">
    <div>
      <div style="font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.05">Let's move, Alex</div>
      <div class="meta">Display · 30 / 700 / −0.02em</div>
    </div>
    <div>
      <div style="font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:-0.01em">Barbell Bench Press</div>
      <div class="meta">Title · 21 / 700</div>
    </div>
    <div>
      <div style="font-family:var(--font-display);font-size:28px;font-weight:700;font-variant-numeric:tabular-nums">24.8k <span style="font-size:13px;font-weight:500;color:var(--clay-muted)">kg</span></div>
      <div class="meta">Stat · 28 / 700 / tabular figures</div>
    </div>
  </div>
</body></html>

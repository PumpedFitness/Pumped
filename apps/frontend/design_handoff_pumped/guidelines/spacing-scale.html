<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4pt base · 20px default gutter" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--accent); border-radius: 4px; width: 100%; }
  .cell { width: 56px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .nm { font-size: 11px; font-weight: 600; color: var(--clay-ink); }
  .vl { font-size: 10.5px; color: var(--clay-muted); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height:var(--space-1)"></div><span class="nm">1</span><span class="vl">4</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-2)"></div><span class="nm">2</span><span class="vl">8</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-3)"></div><span class="nm">3</span><span class="vl">12</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-4)"></div><span class="nm">4</span><span class="vl">16</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-5)"></div><span class="nm">5</span><span class="vl">20</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-6)"></div><span class="nm">6</span><span class="vl">24</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-7)"></div><span class="nm">7</span><span class="vl">32</span></div>
    <div class="cell"><div class="bar" style="height:var(--space-8)"></div><span class="nm">8</span><span class="vl">40</span></div>
  </div>
</body></html>

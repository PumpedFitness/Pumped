<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--clay-bg); color: var(--clay-ink); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--clay-muted); margin-top: 2px; }
  .stack > div { margin-bottom: 15px; }
</style></head>
<body>
  <div class="stack">
    <div>
      <div style="font-family:var(--font-body);font-size:15px;font-weight:500">Log your sets as you go — Pumped keeps everything on-device.</div>
      <div class="meta">Body · 15 / 500</div>
    </div>
    <div>
      <div style="font-family:var(--font-body);font-size:13.5px;font-weight:600">Muscle freshness</div>
      <div class="meta">Label · 13.5 / 600</div>
    </div>
    <div>
      <div style="font-family:var(--font-body);font-size:12.5px;font-weight:500;color:var(--clay-muted)">Last session · Tuesday</div>
      <div class="meta">Caption · 12.5 / 500 / muted</div>
    </div>
    <div>
      <div style="font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent)">Today's session</div>
      <div class="meta">Eyebrow · 11 / 700 / 0.12em / uppercase</div>
    </div>
  </div>
</body></html>

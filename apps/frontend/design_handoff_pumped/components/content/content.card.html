<!-- @dsCard group="Components" viewport="700x300" name="Card · Chip · Badge · ListRow" subtitle="Surfaces and content primitives" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--clay-bg); font-family: var(--font-body); color: var(--clay-ink); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 640px; }
  .card { background: var(--surface-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 16px; }
  .raised { background: var(--surface-raised); color: var(--text-on-raised); border: none; box-shadow: var(--shadow-raised); }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .raised .eyebrow { color: var(--text-on-raised-dim); }
  .title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-top: 4px; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px; border-radius: var(--radius-pill);
          background: var(--surface-card); border: 1px solid var(--border-hairline); font-size: 13.5px; font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .badge { display: inline-flex; padding: 5px 10px; border-radius: var(--radius-pill); background: var(--accent);
           color: var(--accent-ink); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .lr { display: flex; align-items: center; gap: 13px; padding: 13px 0; }
  .lr + .lr { border-top: 1px solid var(--border-hairline); }
  .tile { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--accent-soft); color: var(--accent);
          display: flex; align-items: center; justify-content: center; }
  .detail { margin-left: auto; color: var(--clay-muted); font-size: 14px; }
</style></head>
<body>
  <div class="wrap">
    <div class="card raised">
      <span class="eyebrow">Today's session</span>
      <div class="title">Push Day</div>
      <div style="font-size:13px;color:var(--text-on-raised-dim);margin-top:2px">Chest · Shoulders · Triceps</div>
    </div>
    <div class="card">
      <div class="chips">
        <span class="chip"><span class="dot" style="background:var(--clay-sage)"></span>Chest</span>
        <span class="chip"><span class="dot" style="background:var(--accent)"></span>Legs</span>
        <span class="badge">Today</span>
      </div>
      <div style="margin-top:14px">
        <div class="lr"><span class="tile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M6.5 6.5v11M3 8.5v7M17.5 6.5v11M21 8.5v7M6.5 12h11"/></svg></span> Units <span class="detail">Kilograms</span></div>
        <div class="lr"><span class="tile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a8 8 0 1 0 0 16 8 8 0 0 0 0-16Z"/><path d="M12 13V9M9 2.5h6"/></svg></span> Default rest <span class="detail">90 sec</span></div>
      </div>
    </div>
  </div>
</body></html>

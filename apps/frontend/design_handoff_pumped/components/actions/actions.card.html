<!-- @dsCard group="Components" viewport="700x180" name="Button" subtitle="primary · secondary · ghost — pill, display-font" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--clay-bg); }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 9px; border: none;
         font-family: var(--font-display); font-weight: 600; border-radius: var(--radius-pill); cursor: pointer; }
  .md { height: 52px; padding: 0 22px; font-size: 16px; }
  .sm { height: 40px; padding: 0 16px; font-size: 14px; }
  .primary { background: var(--accent); color: var(--accent-ink); box-shadow: var(--shadow-accent); }
  .secondary { background: var(--surface-raised); color: var(--text-on-raised); }
  .ghost { background: transparent; color: var(--text-primary); border: 1px solid var(--border-hairline); }
  svg { display: block; }
</style></head>
<body>
  <div class="row">
    <button class="btn md primary"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5l12 7.5-12 7.5V4.5Z"/></svg> Start</button>
    <button class="btn md secondary">Next exercise <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></button>
    <button class="btn sm ghost">Skip</button>
  </div>
</body></html>

# Walks the bottom tab bar and asserts each tab's screen renders.
# Tabs and screens are matched by testID (Android resource-id), auto-generated
# from the navigator's screen names — see src/navigation/testIDs.ts.
# Buttons: tab-home / tab-plan / tab-library / tab-history / tab-profile.
# Screens: screen-home / screen-plan / screen-library / screen-history /
#          screen-profile.
appId: ${APP_ID}
---
- launchApp
- assertVisible:
    id: 'screen-home'

- tapOn:
    id: 'tab-plan'
- assertVisible:
    id: 'screen-plan'

- tapOn:
    id: 'tab-library'
- assertVisible:
    id: 'screen-library'

- tapOn:
    id: 'tab-history'
- assertVisible:
    id: 'screen-history'

- tapOn:
    id: 'tab-profile'
- assertVisible:
    id: 'screen-profile'

- tapOn:
    id: 'tab-home'
- assertVisible:
    id: 'screen-home'

# Walks the native bottom tab bar and asserts each tab's screen renders.
# The bar is the OS-native tab bar (@react-navigation/bottom-tabs/unstable), whose
# items expose no RN testID — so tabs are tapped by their visible label text,
# while screens are still matched by testID (screen-*, see src/navigation/testIDs.ts).
# Labels: Home / Schedule / Library / History / User (the Profile tab reads "User").
appId: ${APP_ID}
---
- launchApp
- assertVisible:
    id: 'screen-home'
# Dismiss the React Native dev warning banner if it is present. Its transparent
# parent view covers the tab hit area and can make tab taps no-op.
- tapOn:
    point: 92%,92%

- tapOn: 'Schedule'
- assertVisible:
    id: 'screen-schedule'

- tapOn: 'Library'
- assertVisible:
    id: 'screen-library'

- tapOn: 'History'
- assertVisible:
    id: 'screen-history'

- tapOn: 'User'
- assertVisible:
    id: 'screen-profile'

- tapOn: 'Home'
- assertVisible:
    id: 'screen-home'
